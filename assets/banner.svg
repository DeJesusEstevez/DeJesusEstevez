<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="300" viewBox="0 0 1200 300" role="img" aria-label="José de Jesús — Construyo y despliego software real y probado">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1A1712"/>
      <stop offset="1" stop-color="#120F0B"/>
    </linearGradient>
    <linearGradient id="irid" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#37C9D6"/>
      <stop offset="0.5" stop-color="#8A6BFF"/>
      <stop offset="1" stop-color="#E9B64A"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="300" fill="url(#bg)"/>
  <!-- hairlines de instrumento -->
  <g stroke="#EDE7DC" stroke-opacity="0.06">
    <line x1="0" y1="75" x2="1200" y2="75"/>
    <line x1="0" y1="150" x2="1200" y2="150"/>
    <line x1="0" y1="225" x2="1200" y2="225"/>
  </g>

  <!-- chip iridiscente -->
  <rect x="64" y="64" width="40" height="40" rx="7" fill="url(#irid)"/>
  <rect x="64" y="64" width="40" height="40" rx="7" fill="none" stroke="#EDE7DC" stroke-opacity="0.25"/>

  <!-- 8 lecturas 'en vivo' arriba a la derecha -->
  <g>
    <circle cx="892" cy="84" r="5" fill="#4BBF7A"/><circle cx="916" cy="84" r="5" fill="#4BBF7A"/>
    <circle cx="940" cy="84" r="5" fill="#4BBF7A"/><circle cx="964" cy="84" r="5" fill="#4BBF7A"/>
    <circle cx="988" cy="84" r="5" fill="#4BBF7A"/><circle cx="1012" cy="84" r="5" fill="#4BBF7A"/>
    <circle cx="1036" cy="84" r="5" fill="#4BBF7A"/><circle cx="1060" cy="84" r="5" fill="#4BBF7A"/>
    <text x="1136" y="88" text-anchor="end" font-family="'Courier New',monospace" font-size="13" letter-spacing="2" fill="#9A9083">EN&#160;VIVO</text>
  </g>

  <!-- nombre -->
  <text x="122" y="112" font-family="Segoe UI,Helvetica,Arial,sans-serif" font-size="62" font-weight="800" letter-spacing="-1" fill="#EDE7DC">José de Jesús</text>
  <rect x="124" y="128" width="308" height="5" rx="2" fill="url(#irid)"/>

  <!-- tagline -->
  <text x="124" y="176" font-family="Segoe UI,Helvetica,Arial,sans-serif" font-size="25" fill="#B8AE9E">Construyo y despliego software <tspan fill="#EDE7DC" font-weight="600">real y probado.</tspan></text>
  <text x="124" y="206" font-family="'Courier New',monospace" font-size="14" letter-spacing="1.5" fill="#6E6656">Estudiante de Ing. de Software @ INTEC · Full-Stack · Santo Domingo, RD</text>

  <!-- chips de instrumento -->
  <g font-family="'Courier New',monospace" font-size="14" letter-spacing="1">
    <rect x="124" y="232" width="132" height="34" rx="6" fill="none" stroke="#EDE7DC" stroke-opacity="0.22"/>
    <circle cx="144" cy="249" r="4" fill="#4BBF7A"/>
    <text x="158" y="254" fill="#D8CFBE">8 EN VIVO</text>

    <rect x="268" y="232" width="168" height="34" rx="6" fill="none" stroke="#EDE7DC" stroke-opacity="0.22"/>
    <text x="284" y="254" fill="#D8CFBE">700+ PRUEBAS</text>

    <rect x="448" y="232" width="238" height="34" rx="6" fill="none" stroke="#EDE7DC" stroke-opacity="0.22"/>
    <text x="464" y="254" fill="#D8CFBE">TS · NEXT · NODE · POSTGRES</text>
  </g>
</svg>
